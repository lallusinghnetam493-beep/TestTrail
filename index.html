    <script>
      /**
       * Deep Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
       * This error occurs when 3rd-party scripts (like Razorpay) try to overwrite window.fetch
       * in environments (mobile/webviews) where 'fetch' is a read-only getter on the prototype.
       */
      (function() {
        try {
          var originalFetch = window.fetch;
          if (typeof originalFetch !== 'function') return;

          var currentFetch = originalFetch;
          var patch = {
            get: function() { return currentFetch; },
            set: function(v) { currentFetch = v; },
            configurable: true,
            enumerable: true
          };

          // Function to apply patch to a specific object
          function applyPatch(obj) {
            try {
              var desc = Object.getOwnPropertyDescriptor(obj, 'fetch');
              if (desc && !desc.configurable) return false;
              Object.defineProperty(obj, 'fetch', patch);
              return true;
            } catch (e) {
              return false;
            }
          }

          // 1. Try shadowing on the window instance itself (usually works)
          if (!applyPatch(window)) {
            // 2. If blocked, try the immediate prototype (Window.prototype)
            var proto = Object.getPrototypeOf(window);
            if (!proto || !applyPatch(proto)) {
              // 3. Fallback: Try Window prototype if it exists globally
              if (window.Window && window.Window.prototype) {
                applyPatch(window.Window.prototype);
              }
            }
          }
        } catch (err) {
          // Fail silently to avoid breaking the app in extremely restrictive environments
        }
      })();
    </script>

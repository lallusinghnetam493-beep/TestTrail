    <script>
      // Protection against scripts trying to overwrite window.fetch (common source of mobile crashes)
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Blocked attempt to overwrite window.fetch'); 
                // Do nothing, preserving the original fetch
              },
              configurable: true,
              enumerable: true
            });
            console.log('Fetch protection active');
          }
        } catch (e) {
          console.warn('Fetch protection could not be initialized:', e);
        }
      })();
    </script>

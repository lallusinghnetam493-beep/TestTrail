    <script>
      // Fix for libraries trying to overwrite window.fetch in environments where it is read-only
      (function() {
        const originalFetch = window.fetch;
        
        function protect(obj, prop, name) {
          try {
            if (!obj) return;
            const descriptor = Object.getOwnPropertyDescriptor(obj, prop);
            if (descriptor && !descriptor.configurable) {
              console.warn('Property ' + prop + ' is not configurable on ' + name);
              return;
            }
            Object.defineProperty(obj, prop, {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Prevented overwrite of ' + prop + ' on ' + name);
              }
            });
          } catch (e) {
            console.warn('Failed to protect ' + prop + ' on ' + name);
          }
        }

        protect(window, 'fetch', 'window');
        protect(globalThis, 'fetch', 'globalThis');
        if (typeof Window !== 'undefined') protect(Window.prototype, 'fetch', 'Window.prototype');

        // Global fallback to prevent the app from crashing on fetch assignment
        window.addEventListener('error', function(event) {
          const msg = event.message || (event.error && event.error.message) || '';
          if (msg.includes('fetch') && (msg.includes('getter') || msg.includes('read only'))) {
            console.warn('Intercepted and suppressed fetch overwrite error:', msg);
            event.preventDefault();
            event.stopPropagation();
            return true;
          }
        }, true);

        // Also handle unhandledrejection just in case
        window.addEventListener('unhandledrejection', function(event) {
          const msg = (event.reason && event.reason.message) || '';
          if (msg.includes('fetch') && (msg.includes('getter') || msg.includes('read only'))) {
            console.warn('Intercepted and suppressed fetch overwrite promise rejection:', msg);
            event.preventDefault();
            event.stopPropagation();
          }
        });
      })();
    </script>
